<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sol på uteplatsen</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; font-family: system-ui, sans-serif; }
    #scene { width: 100%; height: 100%; display: block; }
    #panel {
      position: fixed; left: 16px; top: 16px; width: 340px;
      background: rgba(255, 255, 255, 0.93); border-radius: 12px;
      padding: 16px 18px; box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      backdrop-filter: blur(4px);
    }
    #panel h1 { font-size: 17px; margin-bottom: 10px; }
    .row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
    .row label { width: 52px; font-size: 13px; color: #555; }
    .row output { width: 72px; font-size: 14px; font-weight: 600; text-align: right; }
    #season-icon { width: 20px; font-size: 15px; }
    input[type="range"] { flex: 1; }
    #status {
      margin-top: 12px; padding: 10px 12px; border-radius: 8px;
      font-size: 16px; font-weight: 600; text-align: center;
    }
    #status.sun { background: #ffe9a8; }
    #status.shade { background: #d7dce4; }
    #status.night { background: #232a3a; color: #dfe6f5; }
    #windows { margin-top: 10px; font-size: 14px; }
    #suntimes { margin-top: 6px; font-size: 12px; color: #666; }
    #attribution {
      position: fixed; right: 8px; bottom: 6px; font-size: 11px;
      color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="panel">
    <h1>☀️ Sol på uteplatsen</h1>
    <div class="row">
      <label for="date-slider">Datum</label>
      <input type="range" id="date-slider" min="1" max="365" value="172" />
      <output id="date-label"></output>
      <span id="season-icon" aria-hidden="true"></span>
    </div>
    <div class="row">
      <label for="time-slider">Tid</label>
      <input type="range" id="time-slider" min="0" max="1435" step="5" value="720" />
      <output id="time-label"></output>
    </div>
    <div id="status">Laddar…</div>
    <div id="windows"></div>
    <div id="suntimes"></div>
  </div>
  <div id="attribution"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
